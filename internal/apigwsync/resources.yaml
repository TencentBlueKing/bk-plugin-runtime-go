openapi: 3.0.3
info:
  title: 'BK Plugin API'
  version: '1.0.0'
  description: '蓝鲸插件服务 API'

paths:

  /callback/{token}/:
    post:
      operationId: callback
      summary: 插件回调
      description: 第三方系统通知插件异步任务已完成
      tags:
        - callback
      parameters:
        - in: path
          name: token
          schema:
            type: string
          required: true
          description: 回调令牌
      responses:
        '200':
          description: '回调成功'
      x-bk-apigateway-resource:
        isPublic: true
        matchSubpath: false
        backend:
          type: HTTP
          name: default
          method: post
          {# Go runtime 用 gin 注册的是 POST /bk_plugin/callback/:token（不带末尾 /）。 #}
          {# 网关如果在 backend.path 上保留末尾 /，gin 会触发 RedirectTrailingSlash 回 307， #}
          {# 第三方 HTTP 客户端默认不跟随 POST 307 -> 回调失败。所以这里去掉末尾 /。      #}
          {% if settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH %}
          path: /{{ settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH }}/bk_plugin/callback/{token}
          {% else %}
          path: /bk_plugin/callback/{token}
          {% endif %}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs: []
        allowApplyPermission: true
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
        descriptionEn: plugin callback

  /invoke/{version}/:
    post:
      operationId: invoke
      summary: 调用指定版本插件
      description: 调用指定版本的插件执行任务
      tags:
        - invoke
      parameters:
        - in: path
          name: version
          schema:
            type: string
          required: true
          description: 插件版本号
      responses:
        '200':
          description: '调用成功'
      x-bk-apigateway-resource:
        isPublic: true
        matchSubpath: false
        backend:
          type: HTTP
          name: default
          method: post
          {# 与 callback 同理：gin 路由 POST /bk_plugin/invoke/:version 不带末尾 /， #}
          {# backend.path 跟随，避免触发 307 重定向。                              #}
          {% if settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH %}
          path: /{{ settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH }}/bk_plugin/invoke/{version}
          {% else %}
          path: /bk_plugin/invoke/{version}
          {% endif %}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs: []
        allowApplyPermission: true
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
        descriptionEn: Invoke specific version plugin

  /bk_plugin/plugin_api/:
    x-bk-apigateway-method-any:
      operationId: plugin_api
      summary: 插件自定义 API
      description: 插件自定义 API 入口，支持子路径匹配
      tags:
        - plugin_api
      responses:
        default:
          description: '插件自定义响应'
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: true
        backend:
          type: HTTP
          name: default
          method: any
          {% if settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH %}
          path: /{{ settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH }}/bk_plugin/plugin_api/
          {% else %}
          path: /bk_plugin/plugin_api/
          {% endif %}
          matchSubpath: true
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
        disabledStages: []
        descriptionEn: Plugin custom API entry

  /bk_plugin/openapi/:
    x-bk-apigateway-method-any:
      operationId: plugin_openapi
      summary: 插件开放 API
      description: 插件开放 API 入口，支持子路径匹配（第三方系统通过 app_code 调用）
      tags:
        - openapi
      responses:
        default:
          description: '插件开放API响应'
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: true
        backend:
          type: HTTP
          name: default
          method: any
          {% if settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH %}
          path: /{{ settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH }}/bk_plugin/openapi/
          {% else %}
          path: /bk_plugin/openapi/
          {% endif %}
          matchSubpath: true
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
        disabledStages: []
        descriptionEn: Plugin open API entry

  /plugin_api_dispatch:
    post:
      operationId: plugin_api_dispatch
      summary: 插件 API 分发
      description: 将调用方请求分发到插件自定义 API
      tags:
        - plugin_api_dispatch
      responses:
        '200':
          description: '分发成功'
      x-bk-apigateway-resource:
        isPublic: true
        matchSubpath: false
        backend:
          type: HTTP
          name: default
          method: post
          {# 与 callback / invoke 同理：gin 路由 POST /bk_plugin/plugin_api_dispatch 不带末尾 /。 #}
          {% if settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH %}
          path: /{{ settings.BK_PLUGIN_APIGW_BACKEND_SUB_PATH }}/bk_plugin/plugin_api_dispatch
          {% else %}
          path: /bk_plugin/plugin_api_dispatch
          {% endif %}
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        pluginConfigs: []
        allowApplyPermission: true
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
        descriptionEn: Plugin API dispatch
